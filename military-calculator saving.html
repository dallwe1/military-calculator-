<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>군 적금 계산기</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f5f7fa);
    padding:40px;
    text-align:center;
    color:#1f2937;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

nav a{
    margin:0 6px;
    text-decoration:none;
    color:#2563eb;
}

input, button{
    width:100%;
    padding:14px;
    margin-top:12px;
    border-radius:10px;
    border:1px solid #e5e7eb;
    font-size:16px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#1d4ed8;
}

.result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<nav>
  <a href="index.html">전역일 계산기</a>
  <a href="saving.html">군 적금 계산기</a>
  <a href="about.html">사이트 소개</a>
  <a href="privacy.html">개인정보처리방침</a>
</nav>

<h1>💰 군 적금 계산기</h1>

<p>월 적금 금액 입력</p>
<input type="number" id="money" placeholder="예: 500000">

<p>복무 개월 선택</p>
<select id="month">
  <option value="18">18개월 (육군)</option>
  <option value="20">20개월 (해군)</option>
  <option value="21">21개월 (공군/사회복무)</option>
</select>

<button onclick="calc()">계산하기</button>

<div class="result" id="result"></div>

</div>

<script>
function calc(){
    const money = parseInt(document.getElementById("money").value);
    const month = parseInt(document.getElementById("month").value);

    if(!money){
        alert("금액을 입력하세요");
        return;
    }

    const total = money * month;

    document.getElementById("result").innerHTML =
        "총 예상 적금: " + total.toLocaleString() + "원";
}
</script>

</body>
</html>
