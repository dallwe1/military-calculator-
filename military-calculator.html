<title>전역일 계산기 - 군 복무 전역일 자동 계산</title>

<meta name="description" content="군 전역일과 복무 기간을 자동으로 계산해주는 무료 계산기입니다.">

</head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전역일 계산기</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f5f7fa);
    margin:0;
    padding:40px;
    text-align:center;
    color:#1f2937;
}

.container{
    max-width:650px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

nav{
    margin-bottom:20px;
}

nav a{
    text-decoration:none;
    color:#2563eb;
    margin:0 8px;
    font-weight:500;
}

nav a:hover{
    text-decoration:underline;
}

h1{
    margin-bottom:10px;
}

input, select, button{
    width:100%;
    padding:14px;
    margin-top:12px;
    font-size:16px;
    border-radius:10px;
    border:1px solid #e5e7eb;
    box-sizing:border-box;
}

button{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    transform:translateY(-2px);
}

.result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    background:#f3f4f6;
    padding:15px;
    border-radius:12px;
}

.sub{
    margin-top:6px;
    font-size:14px;
    color:#6b7280;
}

.bar-bg{
    width:100%;
    height:22px;
    background:#e5e7eb;
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
}

.bar-fill{
    height:100%;
    width:0%;
    background:#2563eb;
    transition:0.4s;
}
</style>
</head>

<body>

<div class="container">

<nav>
  <a href="index.html">전역일 계산기</a>
  <a href="saving.html">군 적금 계산기</a>
  <a href="about.html">사이트 소개</a>
  <a href="privacy.html">개인정보처리방침</a>
</nav>

<h1>🎖 전역일 계산기</h1>

<p>복무 유형 선택</p>
<select id="serviceType">
    <option value="18">육군 (18개월)</option>
    <option value="20">해군 (20개월)</option>
    <option value="21">공군 / 사회복무 (21개월)</option>
</select>

<p>입대일 선택</p>
<input type="date" id="enlistDate">

<button onclick="calculate()">전역일 계산</button>

<div class="result" id="result"></div>
<div class="sub" id="remaining"></div>
<div class="sub" id="served"></div>

<div class="bar-bg">
  <div id="bar" class="bar-fill"></div>
</div>

<p id="percent"></p>

</div>

<script>
function calculate(){

    const enlistInput = document.getElementById("enlistDate").value;
    if(!enlistInput){
        alert("날짜를 선택하세요");
        return;
    }

    const months = parseInt(document.getElementById("serviceType").value);

    const start = new Date(enlistInput);
    const end = new Date(start);
    end.setMonth(end.getMonth() + months);

    const today = new Date();

    const remain = Math.ceil((end - today) / (1000*60*60*24));
    const total = Math.ceil((end - start) / (1000*60*60*24));
    const served = Math.ceil((today - start) / (1000*60*60*24));

    let progress = Math.floor((served / total) * 100);
    if(progress < 0) progress = 0;
    if(progress > 100) progress = 100;

    document.getElementById("result").innerText =
        "전역일: " + end.toLocaleDateString("ko-KR");

    document.getElementById("served").innerText =
        "복무한 기간: " + served + "일";

    document.getElementById("remaining").innerText =
        remain > 0 ? "남은 기간: " + remain + "일" : "전역 완료";

    document.getElementById("bar").style.width = progress + "%";
    document.getElementById("percent").innerText =
        "진행률: " + progress + "%";
}
</script>

</body>
</html>
